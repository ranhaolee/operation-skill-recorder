<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<style>
  body { width: 280px; margin:0; font:13px/1.5 system-ui,Segoe UI,sans-serif; background:#0f1115; color:#e6e8ec; }
  .pad { padding:14px; }
  h1 { font-size:14px; margin:0 0 10px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#555; margin-right:6px; }
  .dot.on { background:#e0443e; }
  button { width:100%; padding:9px; border:0; border-radius:6px; font-size:13px; cursor:pointer; margin-top:8px; }
  .start { background:#e0443e; color:#fff; }
  .stop { background:#2a2f3a; color:#fff; }
  .link { background:#5b9dff; color:#fff; }
  .row { display:flex; gap:6px; align-items:center; margin-top:8px; }
  input { flex:1; background:#1f2530; border:1px solid #2a2f3a; color:#e6e8ec; border-radius:6px; padding:6px; }
  .mut { color:#8a93a3; font-size:11px; margin-top:8px; }
  .sid { font-family:monospace; color:#8a93a3; font-size:11px; word-break:break-all; }
</style>
</head>
<body>
<div class="pad">
  <h1>🎬 Operation Skill Recorder</h1>
  <div><span class="dot" id="dot"></span><span id="state">未录制</span></div>
  <button id="toggle" class="start">● 开始录制</button>
  <button id="open" class="link">打开 Dashboard</button>
  <div class="row">
    <input id="server" placeholder="http://localhost:3737" />
    <button style="width:auto;margin:0;padding:6px 10px" class="stop" id="save">保存</button>
  </div>
  <div class="sid" id="sid"></div>
  <div class="mut">录制后在当前标签页正常操作系统；停止后到 Dashboard 生成技能。</div>
</div>
<script src="popup.js"></script>
</body>
</html>
